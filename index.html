<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🧠 AI Digest — Calendario</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
      background: #F7F7F7;
      color: #111;
      min-height: 100vh;
    }
    header {
      background: #fff;
      border-bottom: 1px solid #E5E5E5;
      padding: 28px 40px;
      display: flex;
      align-items: baseline;
      gap: 16px;
    }
    header h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.3px; }
    header span { font-size: 14px; color: #999; }
    .container { max-width: 860px; margin: 0 auto; padding: 40px 24px; }

    /* Month nav */
    .month-nav {
      display: flex; align-items: center; gap: 16px; margin-bottom: 32px;
    }
    .month-nav h2 { font-size: 18px; font-weight: 600; flex: 1; }
    .month-nav button {
      background: none; border: 1px solid #E5E5E5; border-radius: 6px;
      width: 32px; height: 32px; cursor: pointer; font-size: 16px;
      color: #555; transition: background .15s;
    }
    .month-nav button:hover { background: #F0F0F0; }

    /* Calendar grid */
    .calendar { background: #fff; border-radius: 12px; border: 1px solid #E5E5E5; overflow: hidden; }
    .weekdays {
      display: grid; grid-template-columns: repeat(7, 1fr);
      background: #FAFAFA; border-bottom: 1px solid #E5E5E5;
    }
    .weekdays span {
      text-align: center; padding: 10px 0;
      font-size: 11px; font-weight: 600; color: #999; text-transform: uppercase; letter-spacing: .5px;
    }
    .days {
      display: grid; grid-template-columns: repeat(7, 1fr);
    }
    .day {
      min-height: 80px; padding: 10px; border-right: 1px solid #F0F0F0;
      border-bottom: 1px solid #F0F0F0; position: relative;
    }
    .day:nth-child(7n) { border-right: none; }
    .day.empty { background: #FAFAFA; }
    .day.today .day-num {
      background: #6366F1; color: #fff; border-radius: 50%;
      width: 26px; height: 26px; display: flex; align-items: center; justify-content: center;
    }
    .day-num { font-size: 13px; font-weight: 500; color: #555; width: 26px; height: 26px; display: flex; align-items: center; justify-content: center; }
    .digest-pill {
      margin-top: 6px; background: #EEF2FF; color: #4F46E5;
      border-radius: 4px; padding: 3px 7px; font-size: 11px; font-weight: 500;
      cursor: pointer; text-decoration: none; display: block;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      transition: background .15s;
    }
    .digest-pill:hover { background: #6366F1; color: #fff; }

    /* Detail panel */
    .detail-panel {
      display: none; background: #fff; border-radius: 12px;
      border: 1px solid #E5E5E5; margin-top: 24px; overflow: hidden;
    }
    .detail-panel.open { display: block; }
    .detail-panel iframe {
      width: 100%; border: none; min-height: 600px;
    }
    .detail-close {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 24px; border-bottom: 1px solid #F0F0F0;
    }
    .detail-close span { font-size: 14px; font-weight: 600; color: #111; }
    .detail-close button {
      background: none; border: 1px solid #E5E5E5; border-radius: 6px;
      padding: 5px 12px; font-size: 12px; cursor: pointer; color: #555;
    }
    .detail-close button:hover { background: #F0F0F0; }

    .empty-state {
      text-align: center; padding: 60px 24px; color: #BBB;
    }
    .empty-state .icon { font-size: 40px; margin-bottom: 16px; }
    .empty-state p { font-size: 14px; line-height: 1.6; }
  </style>
</head>
<body>

<header>
  <h1>🧠 AI Daily Digest</h1>
  <span>Resúmenes diarios de newsletters de Inteligencia Artificial</span>
</header>

<div class="container">
  <div class="month-nav">
    <button id="prevMonth">&#8592;</button>
    <h2 id="monthTitle"></h2>
    <button id="nextMonth">&#8594;</button>
  </div>

  <div class="calendar">
    <div class="weekdays">
      <span>Lun</span><span>Mar</span><span>Mié</span>
      <span>Jue</span><span>Vie</span><span>Sáb</span><span>Dom</span>
    </div>
    <div class="days" id="calendarDays"></div>
  </div>

  <div class="detail-panel" id="detailPanel">
    <div class="detail-close">
      <span id="detailTitle">Digest del día</span>
      <button onclick="closeDetail()">✕ Cerrar</button>
    </div>
    <iframe id="detailFrame" src=""></iframe>
  </div>

  <div class="empty-state" id="emptyState" style="display:none">
    <div class="icon">📭</div>
    <p>No hay digest disponible para este día.</p>
  </div>

  <footer style="margin-top: 60px; padding: 24px; text-align: center; border-top: 1px solid #E5E5E5; color: #999; font-size: 13px;">
    Powered by Gonzalo M
  </footer>
</div>

<script>
  // DIGEST INDEX — filled automatically by the daily task
  // Format: { "YYYY-MM-DD": "digests/YYYY-MM-DD.html" }
  const DIGESTS = {
    "2026-03-25": "digests/2026-03-25.html"
  };

  const MONTHS_ES = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
  let currentDate = new Date();

  function renderCalendar() {
    const year = currentDate.getFullYear();
    const month = currentDate.getMonth();
    document.getElementById('monthTitle').textContent = `${MONTHS_ES[month]} ${year}`;

    const firstDay = new Date(year, month, 1);
    const lastDay = new Date(year, month + 1, 0);
    const today = new Date();

    // Monday-first: 0=Mon...6=Sun
    let startDow = firstDay.getDay(); // 0=Sun
    startDow = startDow === 0 ? 6 : startDow - 1;

    const container = document.getElementById('calendarDays');
    container.innerHTML = '';

    // Empty cells before first day
    for (let i = 0; i < startDow; i++) {
      const empty = document.createElement('div');
      empty.className = 'day empty';
      container.appendChild(empty);
    }

    // Day cells
    for (let d = 1; d <= lastDay.getDate(); d++) {
      const cell = document.createElement('div');
      cell.className = 'day';

      const isToday = (d === today.getDate() && month === today.getMonth() && year === today.getFullYear());
      if (isToday) cell.classList.add('today');

      const numDiv = document.createElement('div');
      numDiv.className = 'day-num';
      numDiv.textContent = d;
      cell.appendChild(numDiv);

      const key = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      if (DIGESTS[key]) {
        const pill = document.createElement('a');
        pill.className = 'digest-pill';
        pill.textContent = '🧠 Ver digest';
        pill.href = '#';
        pill.addEventListener('click', (e) => { e.preventDefault(); openDigest(key, DIGESTS[key]); });
        cell.appendChild(pill);
      }

      container.appendChild(cell);
    }
  }

  function openDigest(dateKey, url) {
    const [y, m, d] = dateKey.split('-');
    const months = ["enero","febrero","marzo","abril","mayo","junio","julio","agosto","septiembre","octubre","noviembre","diciembre"];
    document.getElementById('detailTitle').textContent = `Digest del ${parseInt(d)} de ${months[parseInt(m)-1]} de ${y}`;
    document.getElementById('detailFrame').src = url;
    const panel = document.getElementById('detailPanel');
    panel.classList.add('open');
    panel.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function closeDetail() {
    document.getElementById('detailPanel').classList.remove('open');
    document.getElementById('detailFrame').src = '';
  }

  document.getElementById('prevMonth').addEventListener('click', () => {
    currentDate.setMonth(currentDate.getMonth() - 1);
    renderCalendar();
  });
  document.getElementById('nextMonth').addEventListener('click', () => {
    currentDate.setMonth(currentDate.getMonth() + 1);
    renderCalendar();
  });

  renderCalendar();
</script>
</body>
</html>
